name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy


      - name: Install protoc (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc --yes

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform }}

      - name: Check formatting
        run: cargo ci-fmt

      - name: Clippy
        run: cargo ci-clippy-${{ matrix.platform }}
        shell: bash

      - name: Run tests
        run: cargo ci-test-${{ matrix.platform }}
        shell: bash

  # Build the release binary to catch any linker/feature-flag issues
  build:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc --yes

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-build

      - name: Build release binary
        run: cargo build --release -p rage-cli
        shell: bash

      # Upload the binary as an artifact so it can be downloaded for testing
      - name: Upload binary (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rage-macos
          path: target/release/rage

      - name: Upload binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rage-linux
          path: target/release/rage

      - name: Upload binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rage-windows
          path: target/release/rage.exe

  # macOS sandbox smoke test — verifies DYLD interpose actually works
  sandbox-smoke-macos:
    name: Sandbox smoke test (macOS)
    runs-on: macos-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download rage binary
        uses: actions/download-artifact@v4
        with:
          name: rage-macos
          path: target/release/

      - name: Make binary executable
        run: chmod +x target/release/rage

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run postinstall cache smoke test
        run: ./scripts/test-postinstall-cache.sh
        env:
          # Use a project-local cache to avoid cross-test pollution
          RAGE_CACHE_DIR: /tmp/rage-ci-cache

  # Linux sandbox smoke test — verifies eBPF tracepoints work
  sandbox-smoke-linux:
    name: Sandbox smoke test (Linux)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download rage binary
        uses: actions/download-artifact@v4
        with:
          name: rage-linux
          path: target/release/

      - name: Make binary executable
        run: chmod +x target/release/rage

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Run postinstall cache smoke test
        run: ./scripts/test-postinstall-cache.sh
        env:
          RAGE_CACHE_DIR: /tmp/rage-ci-cache

  # Windows sandbox smoke test — verifies Detours DLL injection works
  # Runs when sandbox-windows-detours DLL is available
  sandbox-smoke-windows:
    name: Sandbox smoke test (Windows)
    runs-on: windows-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download rage binary
        uses: actions/download-artifact@v4
        with:
          name: rage-windows
          path: target/release/

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-detours-dll

      - name: Build Windows Detours DLL
        run: cargo build --release -p sandbox-windows-detours

      - name: Verify DLL exists (named rage_sandbox.dll by crate lib name)
        run: dir target\release\rage_sandbox.dll
        shell: cmd

      - name: Run Windows sandbox integration test
        run: |
          cargo test -p sandbox --test windows_integration -- --include-ignored --nocapture
        env:
          RAGE_SANDBOX_DLL_PATH: ${{ github.workspace }}\target\release\rage_sandbox.dll
        shell: pwsh

      - name: Verify rage binary runs on Windows
        run: .\target\release\rage.exe --version
        shell: pwsh

  # Runs the cross-platform Node.js harness against all 5 fixture workspaces
  e2e-smoke:
    name: E2E fixture smoke tests (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable


      - name: Install protoc (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc --yes

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: fixtures-pnpm-${{ matrix.os }}-${{ hashFiles('tests/fixtures/**/pnpm-lock.yaml') }}

      - name: Build rage
        run: cargo ci-build-${{ matrix.platform }}
        shell: bash

      - name: Run e2e fixture smoke tests
        run: node tests/fixtures/run.mjs
